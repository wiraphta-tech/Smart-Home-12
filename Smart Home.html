<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>แผนผังบ้าน</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #d6cfc6;
    font-family: 'Sarabun', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px;
  }
  .page {
    background: #f0ebe3;
    border-radius: 16px;
    padding: 28px;
    max-width: 680px;
    width: 100%;
    box-shadow: 0 4px 24px rgba(90,62,43,0.12);
  }
  h1 {
    text-align: center;
    font-size: 22px;
    font-weight: 600;
    color: #4a3020;
    margin-bottom: 4px;
  }
  .subtitle {
    text-align: center;
    font-size: 13px;
    color: #8b6f5c;
    margin-bottom: 18px;
  }
  .status-bar {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
    font-size: 13px;
    color: #7a5c45;
  }
  .status-bar span { font-weight: 500; color: #4a3020; }
  .house {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 5px;
    background: #7a6050;
    border: 3px solid #4a3020;
    border-radius: 10px;
    overflow: hidden;
  }
  .room {
    background: #c8bfb2;
    padding: 20px 12px 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: background 0.3s;
    position: relative;
  }
  .room.on {
    background: #fff8e8;
  }
  /* bulb icon */
  .bulb {
    font-size: 28px;
    line-height: 1;
    transition: filter 0.3s, opacity 0.3s;
    opacity: 0.35;
    filter: grayscale(1);
  }
  .room.on .bulb {
    opacity: 1;
    filter: none;
    animation: glow-pulse 2s ease-in-out infinite;
  }
  @keyframes glow-pulse {
    0%, 100% { text-shadow: 0 0 6px #ffd04088; }
    50% { text-shadow: 0 0 14px #ffd040cc; }
  }
  .circle {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: #b09070;
    border: 2px solid #7a6050;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    font-weight: 600;
    color: #3d2510;
    flex-shrink: 0;
    transition: background 0.3s, border-color 0.3s;
  }
  .room.on .circle {
    background: #e8c060;
    border-color: #b08030;
    color: #3d2000;
  }
  .room-label {
    text-align: center;
  }
  .room-label .th {
    font-size: 14px;
    font-weight: 500;
    color: #5a4030;
    line-height: 1.3;
    transition: color 0.3s;
  }
  .room.on .room-label .th { color: #3d2510; }
  .room-label .en {
    font-size: 11px;
    color: #9a7a65;
    margin-top: 2px;
    transition: color 0.3s;
  }
  .room.on .room-label .en { color: #7a5a40; }

  /* Toggle switch */
  .toggle-wrap {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 4px;
  }
  .toggle-label {
    font-size: 11px;
    color: #9a7a65;
    transition: color 0.3s;
    min-width: 22px;
    text-align: right;
  }
  .room.on .toggle-label { color: #b08030; font-weight: 600; }
  .toggle {
    position: relative;
    width: 38px;
    height: 20px;
    cursor: pointer;
  }
  .toggle input {
    opacity: 0;
    width: 0;
    height: 0;
    position: absolute;
  }
  .slider {
    position: absolute;
    inset: 0;
    background: #b09880;
    border-radius: 20px;
    transition: background 0.3s;
    border: 1.5px solid #7a6050;
  }
  .slider::before {
    content: '';
    position: absolute;
    width: 14px;
    height: 14px;
    left: 2px;
    top: 50%;
    transform: translateY(-50%);
    background: #f0ebe3;
    border-radius: 50%;
    transition: transform 0.3s, background 0.3s;
  }
  .toggle input:checked + .slider {
    background: #d4a030;
    border-color: #a07820;
  }
  .toggle input:checked + .slider::before {
    transform: translateX(18px) translateY(-50%);
    background: #fff8e0;
  }

  .controls {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-top: 16px;
  }
  .btn {
    padding: 8px 20px;
    border-radius: 8px;
    border: 1.5px solid #7a6050;
    background: #e4d9cc;
    color: #4a3020;
    font-family: 'Sarabun', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.18s;
  }
  .btn:hover { background: #d4c8b8; }
  .btn.all-on { background: #e8c060; border-color: #a07820; color: #3d2000; }
  .btn.all-on:hover { background: #d4ae48; }
</style>
</head>
<body>
<div class="page">
  <h1>แผนผังบ้าน</h1>
  <p class="subtitle">Floor Plan · ระบบไฟแต่ละห้อง</p>

  <div class="status-bar">
    ไฟเปิดอยู่ <span id="count">0</span> / 6 ห้อง
  </div>

  <div class="house" id="house">
    <div class="room" id="room-1">
      <div class="bulb">💡</div>
      <div class="circle">1</div>
      <div class="room-label">
        <div class="th">ห้องนอนใหญ่</div>
        <div class="en">Master Bedroom</div>
      </div>
      <div class="toggle-wrap">
        <span class="toggle-label">ปิด</span>
        <label class="toggle">
          <input type="checkbox" onchange="toggleRoom(1, this.checked)">
          <span class="slider"></span>
        </label>
        <span class="toggle-label" style="text-align:left;">เปิด</span>
      </div>
    </div>

    <div class="room" id="room-2">
      <div class="bulb">💡</div>
      <div class="circle">2</div>
      <div class="room-label">
        <div class="th">ห้องน้ำ</div>
        <div class="en">Bathroom</div>
      </div>
      <div class="toggle-wrap">
        <span class="toggle-label">ปิด</span>
        <label class="toggle">
          <input type="checkbox" onchange="toggleRoom(2, this.checked)">
          <span class="slider"></span>
        </label>
        <span class="toggle-label" style="text-align:left;">เปิด</span>
      </div>
    </div>

    <div class="room" id="room-3">
      <div class="bulb">💡</div>
      <div class="circle">3</div>
      <div class="room-label">
        <div class="th">ห้องเรียน</div>
        <div class="en">Study Room</div>
      </div>
      <div class="toggle-wrap">
        <span class="toggle-label">ปิด</span>
        <label class="toggle">
          <input type="checkbox" onchange="toggleRoom(3, this.checked)">
          <span class="slider"></span>
        </label>
        <span class="toggle-label" style="text-align:left;">เปิด</span>
      </div>
    </div>

    <div class="room" id="room-4">
      <div class="bulb">💡</div>
      <div class="circle">4</div>
      <div class="room-label">
        <div class="th">ห้องครัว</div>
        <div class="en">Kitchen</div>
      </div>
      <div class="toggle-wrap">
        <span class="toggle-label">ปิด</span>
        <label class="toggle">
          <input type="checkbox" onchange="toggleRoom(4, this.checked)">
          <span class="slider"></span>
        </label>
        <span class="toggle-label" style="text-align:left;">เปิด</span>
      </div>
    </div>

    <div class="room" id="room-5">
      <div class="bulb">💡</div>
      <div class="circle">5</div>
      <div class="room-label">
        <div class="th">หน้าบ้าน</div>
        <div class="en">Front Area</div>
      </div>
      <div class="toggle-wrap">
        <span class="toggle-label">ปิด</span>
        <label class="toggle">
          <input type="checkbox" onchange="toggleRoom(5, this.checked)">
          <span class="slider"></span>
        </label>
        <span class="toggle-label" style="text-align:left;">เปิด</span>
      </div>
    </div>

    <div class="room" id="room-6">
      <div class="bulb">💡</div>
      <div class="circle">6</div>
      <div class="room-label">
        <div class="th">ท้ายบ้าน</div>
        <div class="en">Back Area</div>
      </div>
      <div class="toggle-wrap">
        <span class="toggle-label">ปิด</span>
        <label class="toggle">
          <input type="checkbox" onchange="toggleRoom(6, this.checked)">
          <span class="slider"></span>
        </label>
        <span class="toggle-label" style="text-align:left;">เปิด</span>
      </div>
    </div>
  </div>

  <div class="controls">
    <button class="btn all-on" onclick="setAll(true)">เปิดทั้งหมด</button>
    <button class="btn" onclick="setAll(false)">ปิดทั้งหมด</button>
  </div>
</div>

<script>
  function toggleRoom(id, on) {
    const room = document.getElementById('room-' + id);
    if (on) room.classList.add('on');
    else room.classList.remove('on');
    updateCount();
  }

  function setAll(on) {
    for (let i = 1; i <= 6; i++) {
      const room = document.getElementById('room-' + i);
      const cb = room.querySelector('input[type=checkbox]');
      cb.checked = on;
      if (on) room.classList.add('on');
      else room.classList.remove('on');
    }
    updateCount();
  }

  function updateCount() {
    const count = document.querySelectorAll('.room.on').length;
    document.getElementById('count').textContent = count;
  }
</script>
</body>
</html>
